services:
  api:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - campus-net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: campusconnect
      POSTGRES_USER: campususer
      POSTGRES_PASSWORD: campuspassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campususer -d campusconnect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - campus-net

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - campus-net

networks:
  campus-net:
    driver: bridge

volumes:
  pgdata:
