<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusConnect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
    }
    .login-card {
      background: white; border-radius: 16px; padding: 40px;
      width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-size: 26px; color: #1d4ed8; font-weight: 800; }
    .login-logo p { color: #64748b; font-size: 13px; margin-top: 4px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db;
      border-radius: 8px; font-size: 14px; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #1d4ed8; }
    .btn-primary {
      width: 100%; padding: 12px; background: #1d4ed8; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: #1e40af; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .error-msg { color: #dc2626; font-size: 13px; margin-top: 10px; text-align: center; }

    /* DASHBOARD */
    #dashboard { display: none; flex-direction: column; min-height: 100vh; }
    .navbar {
      background: #1d4ed8; color: white; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .navbar-brand { font-size: 20px; font-weight: 800; }
    .navbar-user { display: flex; align-items: center; gap: 14px; }
    .navbar-user span { font-size: 14px; opacity: 0.9; }
    .btn-logout {
      padding: 6px 14px; background: rgba(255,255,255,0.15); color: white;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
      font-size: 13px; cursor: pointer; transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    .tabs {
      background: white; border-bottom: 2px solid #e2e8f0;
      display: flex; padding: 0 24px; gap: 4px;
    }
    .tab-btn {
      padding: 14px 20px; border: none; background: none; cursor: pointer;
      font-size: 14px; font-weight: 600; color: #64748b;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab-btn:hover { color: #1d4ed8; }
    .tab-btn.active { color: #1d4ed8; border-bottom-color: #1d4ed8; }

    .content { padding: 28px 24px; flex: 1; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .section-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #0f172a; }

    /* CARDS */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card {
      background: white; border-radius: 12px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid #e2e8f0;
    }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .card-title { font-size: 15px; font-weight: 700; color: #0f172a; }
    .badge {
      font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px;
      white-space: nowrap;
    }
    .badge-blue   { background: #dbeafe; color: #1d4ed8; }
    .badge-green  { background: #dcfce7; color: #16a34a; }
    .badge-yellow { background: #fef9c3; color: #ca8a04; }
    .badge-red    { background: #fee2e2; color: #dc2626; }
    .badge-purple { background: #f3e8ff; color: #9333ea; }
    .badge-gray   { background: #f1f5f9; color: #64748b; }

    .card-row { font-size: 13px; color: #475569; margin-bottom: 6px; }
    .card-row strong { color: #1e293b; }

    /* NOTAS */
    .nota-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px;
    }
    .nota-item:last-child { border-bottom: none; }
    .nota-valor { font-weight: 700; font-size: 16px; }
    .promedio-box {
      margin-top: 12px; padding: 10px 14px; border-radius: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .promedio-box.alto  { background: #dcfce7; }
    .promedio-box.medio { background: #fef9c3; }
    .promedio-box.bajo  { background: #fee2e2; }
    .promedio-label { font-size: 13px; font-weight: 600; }
    .promedio-valor { font-size: 20px; font-weight: 800; }

    /* MATERIALES */
    .material-link {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
      color: #1d4ed8; font-size: 14px; font-weight: 600;
      padding: 10px 14px; border: 1.5px solid #dbeafe;
      border-radius: 8px; transition: background 0.2s; margin-top: 12px;
    }
    .material-link:hover { background: #eff6ff; }
    .material-icon { font-size: 20px; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 60px 20px; color: #94a3b8; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }

    /* LOADING */
    .loading { text-align: center; padding: 40px; color: #64748b; font-size: 15px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>🎓 CampusConnect</h1>
      <p>Universidad Innovatec — Portal Académico</p>
    </div>
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="usuario@universidad.edu" />
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" />
    <button class="btn-primary" id="btn-login" onclick="login()">Iniciar sesión</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav class="navbar">
    <span class="navbar-brand">🎓 CampusConnect</span>
    <div class="navbar-user">
      <span id="user-name"></span>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('cursos')">📚 Cursos</button>
    <button class="tab-btn" onclick="switchTab('tareas')">📝 Tareas</button>
    <button class="tab-btn" onclick="switchTab('notas')">🏆 Notas</button>
    <button class="tab-btn" onclick="switchTab('materiales')">📁 Materiales</button>
  </div>

  <div class="content">
    <div id="tab-cursos" class="tab-panel active">
      <div class="section-title">Mis Cursos</div>
      <div id="cursos-content" class="loading">Cargando...</div>
    </div>
    <div id="tab-tareas" class="tab-panel">
      <div class="section-title">Tareas Pendientes</div>
      <div id="tareas-content" class="loading">Cargando...</div>
    </div>
    <div id="tab-notas" class="tab-panel">
      <div class="section-title">Mis Notas</div>
      <div id="notas-content" class="loading">Cargando...</div>
    </div>
    <div id="tab-materiales" class="tab-panel">
      <div class="section-title">Materiales Académicos</div>
      <div id="materiales-content" class="loading">Cargando...</div>
    </div>
  </div>
</div>

<script>
  const API = '';
  let token = null;

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Completa todos los campos.'; return; }
    btn.disabled = true; btn.textContent = 'Ingresando...';
    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.message || 'Credenciales inválidas');
      token = json.data.token;
      const u = json.data.usuario;
      document.getElementById('user-name').textContent = `${u.nombres} ${u.apellidos} (${u.codigo})`;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'flex';
      loadAll();
    } catch (e) { errEl.textContent = e.message; }
    finally { btn.disabled = false; btn.textContent = 'Iniciar sesión'; }
  }

  function logout() {
    token = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('password').value = '';
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['cursos','tareas','notas','materiales'][i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${name}`).classList.add('active');
  }

  async function apiFetch(path) {
    const res = await fetch(`${API}${path}`, { headers: { Authorization: `Bearer ${token}` } });
    const json = await res.json();
    if (!res.ok) throw new Error(json.message || 'Error');
    return json.data;
  }

  function loadAll() { loadCursos(); loadTareas(); loadNotas(); loadMateriales(); }

  async function loadCursos() {
    const el = document.getElementById('cursos-content');
    try {
      const cursos = await apiFetch('/api/cursos');
      if (!cursos.length) { el.innerHTML = empty('📚', 'No tienes cursos activos'); return; }
      el.innerHTML = `<div class="grid">${cursos.map(c => `
        <div class="card">
          <div class="card-header"><div class="card-title">${c.nombre}</div><span class="badge badge-blue">${c.codigo}</span></div>
          <div class="card-row">👨‍🏫 <strong>Docente:</strong> ${c.docenteNombre}</div>
          <div class="card-row">📅 <strong>Semestre:</strong> ${c.semestre}</div>
          <div class="card-row">⭐ <strong>Créditos:</strong> ${c.creditos}</div>
        </div>`).join('')}</div>`;
    } catch (e) { el.innerHTML = `<p style="color:red">${e.message}</p>`; }
  }

  async function loadTareas() {
    const el = document.getElementById('tareas-content');
    try {
      const tareas = await apiFetch('/api/tareas');
      if (!tareas.length) { el.innerHTML = empty('✅', 'No tienes tareas pendientes'); return; }
      el.innerHTML = `<div class="grid">${tareas.map(t => {
        const d = t.diasRestantes;
        const cls = d <= 2 ? 'badge-red' : d <= 7 ? 'badge-yellow' : 'badge-green';
        const fecha = new Date(t.fechaEntrega).toLocaleDateString('es', { day:'2-digit', month:'short', year:'numeric' });
        return `<div class="card">
          <div class="card-header"><div class="card-title">${t.titulo}</div><span class="badge ${cls}">${d === 1 ? '¡Mañana!' : `${d} días`}</span></div>
          <div class="card-row">📚 <strong>Curso:</strong> ${t.curso.nombre}</div>
          <div class="card-row">📅 <strong>Entrega:</strong> ${fecha}</div>
          ${t.descripcion ? `<div class="card-row" style="margin-top:8px;color:#475569">${t.descripcion}</div>` : ''}
        </div>`;
      }).join('')}</div>`;
    } catch (e) { el.innerHTML = `<p style="color:red">${e.message}</p>`; }
  }

  async function loadNotas() {
    const el = document.getElementById('notas-content');
    try {
      const data = await apiFetch('/api/notas');
      if (!data.length) { el.innerHTML = empty('🏆', 'No hay notas registradas'); return; }
      el.innerHTML = `<div class="grid">${data.map(d => {
        const p = d.promedio;
        const pcls = p === null ? '' : p >= 14 ? 'alto' : p >= 11 ? 'medio' : 'bajo';
        const pcolor = p === null ? '' : p >= 14 ? '#16a34a' : p >= 11 ? '#ca8a04' : '#dc2626';
        return `<div class="card">
          <div class="card-header"><div class="card-title">${d.curso.nombre}</div><span class="badge badge-blue">${d.curso.codigo}</span></div>
          ${d.notas.map(n => `<div class="nota-item"><span style="color:#475569">${n.tipo}</span>
            <span class="nota-valor" style="color:${n.valor>=14?'#16a34a':n.valor>=11?'#ca8a04':'#dc2626'}">${n.valor}</span></div>`).join('')}
          ${p !== null ? `<div class="promedio-box ${pcls}">
            <span class="promedio-label">Promedio</span>
            <span class="promedio-valor" style="color:${pcolor}">${p}</span></div>`
          : '<div class="card-row" style="margin-top:8px">Sin notas aún</div>'}
        </div>`;
      }).join('')}</div>`;
    } catch (e) { el.innerHTML = `<p style="color:red">${e.message}</p>`; }
  }

  async function loadMateriales() {
    const el = document.getElementById('materiales-content');
    try {
      const mats = await apiFetch('/api/materiales');
      if (!mats.length) { el.innerHTML = empty('📁', 'No hay materiales disponibles'); return; }
      const iconos = { DOCUMENTO:'📄', VIDEO:'🎬', ENLACE:'🔗', PRESENTACION:'📊' };
      const colores = { DOCUMENTO:'badge-blue', VIDEO:'badge-red', ENLACE:'badge-green', PRESENTACION:'badge-purple' };
      el.innerHTML = `<div class="grid">${mats.map(m => `
        <div class="card">
          <div class="card-header"><div class="card-title">${m.nombre}</div><span class="badge ${colores[m.tipo]||'badge-gray'}">${m.tipo}</span></div>
          <div class="card-row">📚 <strong>Curso:</strong> ${m.curso.nombre}</div>
          <a class="material-link" href="${m.url}" target="_blank" rel="noopener">
            <span class="material-icon">${iconos[m.tipo]||'📎'}</span>Abrir material
          </a>
        </div>`).join('')}</div>`;
    } catch (e) { el.innerHTML = `<p style="color:red">${e.message}</p>`; }
  }

  function empty(icon, msg) {
    return `<div class="empty"><div class="empty-icon">${icon}</div><p>${msg}</p></div>`;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
  });
</script>
</body>
</html>
